<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — Netlink.bio</title>
    <link rel="icon" type="image/png" href="/assets/netlinkbio-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; }
        .tosca { color: #14b8a6; }
        .bg-tosca { background-color: #14b8a6; }
        .hover-bg-tosca-dark:hover { background-color: #0d9488; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; left: 20px;
            max-width: 360px; margin-left: auto;
            background: #ef4444; color: white; padding: 12px 20px;
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: translateY(100px); transition: transform 0.3s; z-index: 60;
        }
        .toast.show { transform: translateY(0); }
        .toast.success { background: #10b981; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast" class="toast"></div>

    <div class="w-full max-w-sm">
        <a href="index.html" class="flex items-center justify-center gap-2 mb-8">
            <img src="/assets/netlinkbio-icon.png" alt="Netlink.bio" class="w-9 h-9 rounded-xl">
            <span class="font-poppins font-bold text-xl text-gray-900">netlink<span class="tosca">.bio</span></span>
        </a>

        <div id="claimBanner" class="hidden mb-4 p-3 bg-tosca/10 border border-tosca/30 rounded-xl text-center">
            <p class="text-sm text-gray-700">
                Claiming <span id="claimUsernameLabel" class="font-semibold tosca"></span> — sign up to lock it in
            </p>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
            <div class="flex mb-6 border-b border-gray-100">
                <button id="tabSignIn" onclick="switchTab('signin')" class="flex-1 pb-3 text-sm font-semibold border-b-2 border-tosca tosca">Log in</button>
                <button id="tabSignUp" onclick="switchTab('signup')" class="flex-1 pb-3 text-sm font-semibold border-b-2 border-transparent text-gray-400">Sign up</button>
            </div>

            <button id="googleBtn" onclick="handleGoogleLogin()" class="w-full py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition flex items-center justify-center gap-2 mb-4">
                <svg class="w-4 h-4" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.5 29.6 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13.5 24 13.5c3.1 0 5.8 1.1 8 3l6-6C34.6 7.5 29.6 5.5 24 5.5c-7.7 0-14.3 4.4-17.7 10.9z"/><path fill="#4CAF50" d="M24 44.5c5.5 0 10.4-1.9 14.1-5.1l-6.5-5.5c-2 1.5-4.6 2.4-7.6 2.4-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.6 39.9 16.3 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.5 5.5C41.5 36 44.5 30.5 44.5 24c0-1.2-.1-2.4-.3-3.5z"/></svg>
                Continue with Google
            </button>
            <p class="text-center text-[11px] text-gray-400 -mt-2 mb-4">Instantly creates your Netlink wallet too</p>
            <div class="flex items-center gap-3 mb-4">
                <div class="flex-1 h-px bg-gray-100"></div>
                <span class="text-xs text-gray-400">or</span>
                <div class="flex-1 h-px bg-gray-100"></div>
            </div>

            <form id="authForm" class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1.5">Email</label>
                    <input id="email" type="email" required placeholder="you@example.com"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tosca/30 focus:border-tosca transition">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1.5">Password</label>
                    <input id="password" type="password" required minlength="6" placeholder="••••••••"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tosca/30 focus:border-tosca transition">
                </div>
                <button id="submitBtn" type="submit"
                    class="w-full py-3 bg-tosca hover-bg-tosca-dark text-white font-semibold rounded-xl transition flex items-center justify-center gap-2">
                    <span id="submitLabel">Log in</span>
                    <i id="submitSpinner" data-lucide="loader-2" class="w-4 h-4 animate-spin hidden"></i>
                </button>
            </form>

            <p id="switchHint" class="text-center text-sm text-gray-500 mt-5">
                Don't have an account?
                <button onclick="switchTab('signup')" class="tosca font-medium hover:underline">Sign up</button>
            </p>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">
            <a href="index.html" class="hover:text-gray-600 transition">&larr; Back to homepage</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        const SUPABASE_URL = 'https://fuewalufgiclrcgszlit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FcmN6iwrOJp-5KBtBU8Cww_ZtvzahQb';
        window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mode = 'signin';

        function switchTab(newMode) {
            mode = newMode;
            const isSignIn = mode === 'signin';
            document.getElementById('tabSignIn').classList.toggle('border-tosca', isSignIn);
            document.getElementById('tabSignIn').classList.toggle('tosca', isSignIn);
            document.getElementById('tabSignIn').classList.toggle('border-transparent', !isSignIn);
            document.getElementById('tabSignIn').classList.toggle('text-gray-400', !isSignIn);

            document.getElementById('tabSignUp').classList.toggle('border-tosca', !isSignIn);
            document.getElementById('tabSignUp').classList.toggle('tosca', !isSignIn);
            document.getElementById('tabSignUp').classList.toggle('border-transparent', isSignIn);
            document.getElementById('tabSignUp').classList.toggle('text-gray-400', isSignIn);

            document.getElementById('submitLabel').textContent = isSignIn ? 'Log in' : 'Create account';
            document.getElementById('switchHint').innerHTML = isSignIn
                ? `Don't have an account? <button onclick="switchTab('signup')" class="tosca font-medium hover:underline">Sign up</button>`
                : `Already have an account? <button onclick="switchTab('signin')" class="tosca font-medium hover:underline">Log in</button>`;
        }

        window.showToast = function (message, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.toggle('success', isSuccess);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        };

        function setLoading(isLoading) {
            document.getElementById('submitBtn').disabled = isLoading;
            document.getElementById('submitSpinner').classList.toggle('hidden', !isLoading);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const claimedUsername = urlParams.get('username');
        const initialMode = urlParams.get('mode');

        if (claimedUsername) {
            sessionStorage.setItem('pendingUsername', claimedUsername);
            document.getElementById('claimUsernameLabel').textContent = `netlink.bio/${claimedUsername}`;
            document.getElementById('claimBanner').classList.remove('hidden');
        }
        if (initialMode === 'signup') {
            switchTab('signup');
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            setLoading(true);
            try {
                if (mode === 'signin') {
                    const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'dashboard.html';
                } else {
                    const { error } = await window.supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                window.showToast(err.message || 'Something went wrong. Please try again.');
            } finally {
                setLoading(false);
            }
        });

        (async () => {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        })();
    </script>

    <script type="module">
        import { SequenceWaaS } from 'https://esm.sh/@0xsequence/waas';

        const GOOGLE_CLIENT_ID = 207398676098-o9j3ijhd20latst8rq1orvt6rvlk8v06.apps.googleusercontent.com; // isi dari Google Cloud Console
        const SEQUENCE_PROJECT_ACCESS_KEY = 'AQAAAAAAAMI8q-Xw_LF_zvGQlt_2l-mDYDA';
        const SEQUENCE_WAAS_CONFIG_KEY = 'eyJwcm9qZWN0SWQiOjQ5NzI0LCJycGNTZXJ2ZXIiOiJodHRwczovL3dhYXMuc2VxdWVuY2UuYXBwIn0=';

        const sequenceWaas = new SequenceWaaS({
            network: 'polygon',
            projectAccessKey: SEQUENCE_PROJECT_ACCESS_KEY,
            waasConfigKey: SEQUENCE_WAAS_CONFIG_KEY,
        });

        async function handleGoogleCredential(response) {
            const idToken = response.credential;
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;

            try {
                const { error: supaError } = await window.supabaseClient.auth.signInWithIdToken({
                    provider: 'google',
                    token: idToken,
                });
                if (supaError) throw supaError;

                try {
                    const walletAddress = await sequenceWaas.signIn({ idToken }, 'Netlink Web');
                    const { data: { user } } = await window.supabaseClient.auth.getUser();
                    if (user) {
                        await window.supabaseClient
                            .from('profiles')
                            .update({ wallet_address: walletAddress })
                            .eq('id', user.id)
                            .is('wallet_address', null);
                    }
                } catch (waasErr) {
                    console.error('Sequence wallet creation failed (non-blocking):', waasErr);
                }

                window.location.href = 'dashboard.html';
            } catch (err) {
                window.showToast(err.message || 'Google sign-in failed. Please try again.');
                btn.disabled = false;
            }
        }

        function initGoogle() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleCredential,
            });
        }
        window.addEventListener('load', initGoogle);

        window.handleGoogleLogin = function () {
            google.accounts.id.prompt((notification) => {
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    window.supabaseClient.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: window.location.origin + '/dashboard.html' },
                    });
                }
            });
        };
    </script>
</body>
</html>
