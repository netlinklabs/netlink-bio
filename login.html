<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — Netlink.bio</title>
    <link rel="icon" type="image/png" href="/assets/netlinkbio-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; }
        .tosca { color: #14b8a6; }
        .bg-tosca { background-color: #14b8a6; }
        .hover-bg-tosca-dark:hover { background-color: #0d9488; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; left: 20px;
            max-width: 360px; margin-left: auto;
            background: #ef4444; color: white; padding: 12px 20px;
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: translateY(100px); transition: transform 0.3s; z-index: 60;
        }
        .toast.show { transform: translateY(0); }
        .toast.success { background: #10b981; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast" class="toast"></div>

    <div class="w-full max-w-sm">
        <a href="index.html" class="flex items-center justify-center gap-2 mb-8">
            <img src="/assets/netlinkbio-icon.png" alt="Netlink.bio" class="w-9 h-9 rounded-xl">
            <span class="font-poppins font-bold text-xl text-gray-900">netlink<span class="tosca">.bio</span></span>
        </a>

        <div id="claimBanner" class="hidden mb-4 p-3 bg-tosca/10 border border-tosca/30 rounded-xl text-center">
            <p class="text-sm text-gray-700">
                Claiming <span id="claimUsernameLabel" class="font-semibold tosca"></span> — sign up to lock it in
            </p>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
            <div class="flex mb-6 border-b border-gray-100">
                <button id="tabSignIn" onclick="switchTab('signin')" class="flex-1 pb-3 text-sm font-semibold border-b-2 border-tosca tosca">Log in</button>
                <button id="tabSignUp" onclick="switchTab('signup')" class="flex-1 pb-3 text-sm font-semibold border-b-2 border-transparent text-gray-400">Sign up</button>
            </div>

            <button type="button" onclick="handleGoogleLogin()" class="w-full py-2.5 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold rounded-xl transition flex items-center justify-center gap-3 mb-4 shadow-sm text-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                Continue with Google
            </button>
            
            <p class="text-center text-[11px] text-gray-400 -mt-2 mb-4">Connect your Web3 Wallet in the dashboard later</p>
            <div class="flex items-center gap-3 mb-4">
                <div class="flex-1 h-px bg-gray-100"></div>
                <span class="text-xs text-gray-400">or</span>
                <div class="flex-1 h-px bg-gray-100"></div>
            </div>

            <form id="authForm" class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1.5">Email</label>
                    <input id="email" type="email" required placeholder="you@example.com"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tosca/30 focus:border-tosca transition">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1.5">Password</label>
                    <input id="password" type="password" required minlength="6" placeholder="••••••••"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tosca/30 focus:border-tosca transition">
                </div>
                <button id="submitBtn" type="submit"
                    class="w-full py-3 bg-tosca hover-bg-tosca-dark text-white font-semibold rounded-xl transition flex items-center justify-center gap-2">
                    <span id="submitLabel">Log in</span>
                    <i id="submitSpinner" data-lucide="loader-2" class="w-4 h-4 animate-spin hidden"></i>
                </button>
            </form>

            <p id="switchHint" class="text-center text-sm text-gray-500 mt-5">
                Don't have an account?
                <button onclick="switchTab('signup')" class="tosca font-medium hover:underline">Sign up</button>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        const SUPABASE_URL = 'https://fuewalufgiclrcgszlit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FcmN6iwrOJp-5KBtBU8Cww_ZtvzahQb';
        window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mode = 'signin';

        function switchTab(newMode) {
            mode = newMode;
            const isSignIn = mode === 'signin';
            document.getElementById('tabSignIn').classList.toggle('border-tosca', isSignIn);
            document.getElementById('tabSignIn').classList.toggle('tosca', isSignIn);
            document.getElementById('tabSignIn').classList.toggle('border-transparent', !isSignIn);
            document.getElementById('tabSignIn').classList.toggle('text-gray-400', !isSignIn);

            document.getElementById('tabSignUp').classList.toggle('border-tosca', !isSignIn);
            document.getElementById('tabSignUp').classList.toggle('tosca', !isSignIn);
            document.getElementById('tabSignUp').classList.toggle('border-transparent', isSignIn);
            document.getElementById('tabSignUp').classList.toggle('text-gray-400', isSignIn);

            document.getElementById('submitLabel').textContent = isSignIn ? 'Log in' : 'Create account';
            document.getElementById('switchHint').innerHTML = isSignIn
                ? `Don't have an account? <button type="button" onclick="switchTab('signup')" class="tosca font-medium hover:underline">Sign up</button>`
                : `Already have an account? <button type="button" onclick="switchTab('signin')" class="tosca font-medium hover:underline">Log in</button>`;
        }

        window.showToast = function (message, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.toggle('success', isSuccess);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        };

        function setLoading(isLoading) {
            document.getElementById('submitBtn').disabled = isLoading;
            document.getElementById('submitSpinner').classList.toggle('hidden', !isLoading);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const claimedUsername = urlParams.get('username');
        if (claimedUsername) {
            sessionStorage.setItem('pendingUsername', claimedUsername);
            document.getElementById('claimUsernameLabel').textContent = `netlink.bio/${claimedUsername}`;
            document.getElementById('claimBanner').classList.remove('hidden');
        }

        // ==========================================
        // 🚀 FUNGSI GOOGLE OAUTH SUPER AMAN
        // ==========================================
        window.handleGoogleLogin = async function () {
            try {
                const { error } = await window.supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { 
                        redirectTo: window.location.origin + '/dashboard.html' 
                    }
                });
                if (error) throw error;
            } catch (err) {
                console.error('OAuth Error:', err);
                window.showToast('Gagal terhubung ke Google.');
            }
        };

        // Form Manual Email
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            setLoading(true);
            try {
                if (mode === 'signin') {
                    const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'dashboard.html';
                } else {
                    const { error } = await window.supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                window.showToast(err.message || 'Gagal login.');
            } finally {
                setLoading(false);
            }
        });

        // Redirect jika sudah login
        (async () => {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        })();
    </script>
</body>
</html>
