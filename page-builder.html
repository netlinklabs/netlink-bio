<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netlink.bio - Landing Page Builder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    #previewArea { width: 100%; min-height: 100vh; background: white; transition: width 0.4s; margin: 0; }
    .section-inner { max-width: 800px; margin: 0 auto; width: 100%; padding: 0 24px; }
    
    .page-header { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; padding: 12px 24px; }
    .hero-section { position: relative; height: 380px; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #D4A574 0%, #E8953A 100%); }
    .hero-content-wrap { position: absolute; inset: 0; z-index: 3; display: flex; align-items: flex-end; padding: 32px 24px; }
    
    .services-section { padding: 40px 0; background: #f5f0eb; }
    #servicesGrid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 20px; }
    @media (min-width: 768px) { #servicesGrid { grid-template-columns: repeat(2, 1fr); } }
    
    .service-card { background: white; border-radius: 16px; padding: 20px; display: flex; align-items: flex-start; gap: 16px; border: 1px solid #f0f0f0; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .service-info { flex: 1; }
    .service-price { font-size: 14px; font-weight: 700; color: #5D4037; }
    
    .image-section { background: white; padding: 40px 0; }
    #additionalImageContainer { width: 100%; border-radius: 16px; overflow: hidden; background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 200px; }
    #additionalImg { width: 100%; height: auto; object-fit: cover; display: none; }
    
    .page-footer { padding: 40px 24px; text-align: center; background: #f8f8f8; border-top: 1px solid #f0f0f0; font-size: 13px; color: #999; }
    
    #sidebar { position: fixed; top: 0; right: 0; height: 100vh; width: 100%; max-width: 420px; background: #2D2D2D; z-index: 50; transform: translateX(100%); transition: transform 0.4s; overflow-y: auto; }
    #sidebar.active { transform: translateX(0); }
    .sidebar-content { padding: 24px; color: white; }
    .sidebar-input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #3A3A3A; color: white; }
</style>
</head>
<body>
    <div id="previewArea">
        <header class="page-header"><div class="section-inner" style="display:flex; justify-content:space-between;">
            <div class="header-brand"><div id="logoBox" class="logo-box" style="background:#5D4037;">K</div>
            <div class="header-text"><h1 id="bizName">Kopi Senja</h1></div></div>
        </div></header>

        <section id="heroModule" class="hero-section">
            <div id="heroBg" class="hero-bg"></div>
            <div class="hero-content-wrap"><div class="section-inner"><h1 id="heroTitle">Crafted with Heart</h1></div></div>
        </section>

        <section id="servicesModule" class="services-section">
            <div class="section-inner" id="servicesContent"></div>
        </section>
        
        <section id="imageModule" class="image-section">
            <div class="section-inner">
                <div id="additionalImageContainer">
                    <span id="additionalImgPlaceholder">Additional Full Image</span>
                    <img id="additionalImg" src="" alt="Additional">
                </div>
            </div>
        </section>

        <footer class="page-footer"><div class="section-inner"><p>Made with Netlink.bio</p></div></footer>
    </div>
    
    <button id="editToggleBtn" onclick="toggleSidebar()" style="position:fixed; bottom:30px; right:30px; z-index:60; width:50px; height:50px; border-radius:50%; border:none; background:#333; color:white; cursor:pointer;"><i class="fa-solid fa-pen"></i></button>

    <div id="sidebar">
        <div class="sidebar-content" id="sidebarContent">
            </div>
    </div>
        <script>
        let offers = JSON.parse(JSON.stringify(defaultOffers));
        let currentPrimary = '#5D4037';
        let currentCurrency = 'IDR';
        let currentIconEditingIndex = null;

        function renderOffers() {
            const container = document.getElementById('servicesContent');
            const cardsHtml = `<div id="servicesGrid">` + offers.map((offer, i) => `
                <div class="service-card">
                    <div style="font-size:24px; color: ${currentPrimary};"><i class="${offer.icon}"></i></div>
                    <div class="service-info">
                        <h4>${offer.title}</h4>
                        <p>${offer.desc}</p>
                        <div style="margin-top:8px;"><span class="service-price">${formatPrice(offer.price, currentCurrency)}</span></div>
                    </div>
                </div>
            `).join('') + `</div>`;
            container.innerHTML = `<h3 class="section-title">Offerings</h3>` + cardsHtml;
        }

        function selectIcon(iconClass) {
            if (currentIconEditingIndex !== null) {
                offers[currentIconEditingIndex].icon = iconClass;
                renderOffers();
                renderOfferEditor();
            }
            closeIconPicker();
        }
        
        // ... (Fungsi pendukung lainnya: renderOfferEditor, handleAdditionalUpload, dll)
        
        window.addEventListener('DOMContentLoaded', () => {
            renderOffers();
            renderOfferEditor();
        });
    </script>
</body>
</html>
